<!DOCTYPE html>
<html>
<head>
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <div id="g_id_onload"
    data-client_id="1027986971476-b2pq7iu1kpu6s0tna24kqsub53b6jgi3.apps.googleusercontent.com"
    data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <script>
    function handleCredentialResponse(response) {
      document.getElementById("token").innerText = response.credential;
    }
  </script>

  <h3>Your Token:</h3>
  <p id="token" style="word-break: break-all; color: green;"></p>
  <button onclick="navigator.clipboard.writeText(document.getElementById('token').innerText)">
    Copy Token
  </button>
</body>
</html>
